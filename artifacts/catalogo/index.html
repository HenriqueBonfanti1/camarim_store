<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo de Produtos</title>
    <meta name="description" content="Catálogo online de produtos. Navegue pelas categorias e entre em contato via WhatsApp." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Catálogo de Produtos" />
    <meta property="og:description" content="Catálogo online de produtos. Navegue pelas categorias e entre em contato via WhatsApp." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Catálogo de Produtos" />
    <meta name="twitter:description" content="Catálogo online de produtos. Navegue pelas categorias e entre em contato via WhatsApp." />
    <link rel="icon" type="image/svg+xml" href="./assets/icons/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>

    <!-- OVERLAY (sidebar mobile) -->
    <div class="overlay" id="overlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Categorias</span>
        <button class="sidebar-close" id="sidebar-close" aria-label="Fechar menu">&#x2715;</button>
      </div>
      <nav class="sidebar-nav">
        <ul id="category-list">
          <li>
            <button class="category-btn active" data-category="Todos">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
              Todos os Produtos
            </button>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- HEADER -->
    <header class="header" id="header">
      <div class="header-inner">
        <div class="header-left">
          <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menu">
            <span></span><span></span><span></span>
          </button>
          <a href="./" class="brand">
            <div class="brand-logo" id="brand-logo">
              <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            </div>
            <span class="brand-name" id="brand-name">Minha Loja</span>
          </a>
        </div>
        <div class="header-center">
          <div class="search-wrap">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="search" class="search-input" id="search-input" placeholder="Pesquisar produtos..." autocomplete="off" />
            <button class="search-clear" id="search-clear" aria-label="Limpar pesquisa">&#x2715;</button>
          </div>
        </div>
        <div class="header-right">
          <span class="product-count" id="product-count"></span>
        </div>
      </div>
    </header>

    <!-- MAIN LAYOUT -->
    <div class="layout">
      <div class="main-content">

        <!-- ACTIVE FILTER BADGE -->
        <div class="filter-bar" id="filter-bar" style="display:none;">
          <span class="filter-label">Filtrando por:</span>
          <span class="filter-badge" id="filter-badge"></span>
          <button class="filter-clear" id="filter-clear">Limpar filtro</button>
        </div>

        <!-- GRID DE PRODUTOS -->
        <div class="products-grid" id="products-grid"></div>

        <!-- ESTADO VAZIO -->
        <div class="empty-state" id="empty-state" style="display:none;">
          <div class="empty-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </div>
          <h3>Nenhum produto encontrado</h3>
          <p>Tente outro termo de pesquisa ou selecione outra categoria.</p>
          <button class="btn-primary" id="reset-btn">Ver todos os produtos</button>
        </div>

        <!-- LOADING STATE -->
        <div class="loading-state" id="loading-state">
          <div class="spinner"></div>
          <p>Carregando produtos...</p>
        </div>

      </div>
    </div>

    <!-- MODAL -->
    <div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal" id="modal">
        <button class="modal-close" id="modal-close" aria-label="Fechar">&#x2715;</button>
        <div class="modal-inner">
          <div class="modal-gallery" id="modal-gallery">
            <div class="modal-main-img-wrap">
              <img class="modal-main-img" id="modal-main-img" src="" alt="" />
            </div>
            <div class="modal-thumbs" id="modal-thumbs"></div>
          </div>
          <div class="modal-info">
            <div class="modal-badge" id="modal-badge"></div>
            <h2 class="modal-title" id="modal-title"></h2>
            <p class="modal-code" id="modal-code"></p>
            <p class="modal-desc" id="modal-desc"></p>
            <button class="btn-whatsapp" id="modal-whatsapp-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
              Tenho Interesse
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="./js/app.js"></script>
  </body>
</html>
