kind = "web"
previewPath = "/"
title = "ShiftX — Site Institucional"
version = "1.0.0"
id = "artifacts/shiftx-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20458

[services.development]
run = "pnpm --filter @workspace/shiftx-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shiftx-site", "run", "build" ]
publicDir = "artifacts/shiftx-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20458"
BASE_PATH = "/"
